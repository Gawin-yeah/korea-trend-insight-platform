services:
  - type: web
    name: korea-trend-insight-web
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile.prod
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: korea-trend-insight-db
          property: connectionString
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: SEED_ON_BOOT
        value: "false"
      - key: YOUTUBE_REGION_CODE
        value: KR
      - key: NAVER_SEARCH_DISPLAY
        value: "10"
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: AUTO_REFRESH_INTERVAL_SECONDS
        value: "60"
      - key: NEXT_PUBLIC_AUTO_REFRESH_SECONDS
        value: "60"
      - key: REALTIME_STALE_AFTER_MINUTES
        value: "20"
      - key: DISABLE_REALTIME_AUTOMATION
        value: "false"
      - key: GOOGLE_TRENDS_RSS_URL
        value: https://trends.google.com/trending/rss?geo=KR
      - key: YOUTUBE_API_KEY
        sync: false
      - key: NAVER_CLIENT_ID
        sync: false
      - key: NAVER_CLIENT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: INSTAGRAM_ACCESS_TOKEN
        sync: false
      - key: INSTAGRAM_BUSINESS_ACCOUNT_ID
        sync: false
      - key: THREADS_ACCESS_TOKEN
        sync: false
      - key: THREADS_USER_ID
        sync: false
      - key: X_BEARER_TOKEN
        sync: false

  - type: worker
    name: korea-trend-insight-worker
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile.prod
    dockerCommand: sh -c "npm run db:migrate && npm run worker"
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: korea-trend-insight-db
          property: connectionString
      - key: SEED_ON_BOOT
        value: "false"
      - key: YOUTUBE_REGION_CODE
        value: KR
      - key: NAVER_SEARCH_DISPLAY
        value: "10"
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: AUTO_REFRESH_INTERVAL_SECONDS
        value: "60"
      - key: REALTIME_STALE_AFTER_MINUTES
        value: "20"
      - key: DISABLE_REALTIME_AUTOMATION
        value: "false"
      - key: GOOGLE_TRENDS_RSS_URL
        value: https://trends.google.com/trending/rss?geo=KR
      - key: YOUTUBE_API_KEY
        sync: false
      - key: NAVER_CLIENT_ID
        sync: false
      - key: NAVER_CLIENT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: INSTAGRAM_ACCESS_TOKEN
        sync: false
      - key: INSTAGRAM_BUSINESS_ACCOUNT_ID
        sync: false
      - key: THREADS_ACCESS_TOKEN
        sync: false
      - key: THREADS_USER_ID
        sync: false
      - key: X_BEARER_TOKEN
        sync: false

databases:
  - name: korea-trend-insight-db
    plan: free
    databaseName: ktrend
    user: ktrend
